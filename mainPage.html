<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- google font-Geist link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- daisy UI and tailwind css link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>GitHub Issue Tracker - Home</title>
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <header
      class="flex flex-col md:flex-row gap-4 md:justify-between px-20 py-4 items-center bg-white shadow-sm"
    >
      <div class="flex justify-center items-center">
        <div class="max-w-9">
          <img src="./assets/github-logo.png" alt="github logo" />
        </div>
        <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
      </div>
      <div class="flex flex-col md:flex-row gap-4 justify-center items-center">
        <label class="input">
          <svg
            class="h-[1em] opacity-50"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2.5"
              fill="none"
              stroke="currentColor"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input
            id="search-issue"
            class=""
            oninput="searchIssues()"
            type="search"
            required
            placeholder="Search issues..."
          />
        </label>
        <button class="btn btn-primary">
          <i class="fa-solid fa-plus"></i>New Issue
        </button>
      </div>
    </header>
    <main class="py-4 md:py-16 max-w-6xl mx-auto space-y-4">
      <section class="py-6 px-6 bg-base-100 rounded-lg shadow-sm">
        <div class="flex gap-2 flex-wrap justify-center md:justify-normal">
          <button
            id="all-tab"
            onclick="tabActive('all')"
            class="btn btn-soft btn-primary w-32"
          >
            All
          </button>
          <button
            id="open-tab"
            onclick="tabActive('open')"
            class="btn btn-soft btn-primary w-32"
          >
            Open
          </button>
          <button
            id="closed-tab"
            onclick="tabActive('closed')"
            class="btn btn-soft btn-primary w-32"
          >
            closed
          </button>
        </div>
      </section>
      <section class="bg-base-100 rounded-lg shadow-sm">
        <div
          class="p-6 flex justify-center md:justify-between flex-col md:flex-row"
        >
          <div class="flex items-center gap-2">
            <div><img src="./assets/Aperture.png" alt="Aperture" /></div>
            <div>
              <h1 id="issues-count" class="text-xl font-semibold">50 Issues</h1>
              <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
          </div>
          <div class="flex justify-center items-center gap-2 mt-6 md:mt-0">
            <div>
              <img src="./assets/Ellipse 2.png" alt="open" />
            </div>
            <p>Open</p>
            <div>
              <img src="./assets/Ellipse 2 (1).png" alt="closed" />
            </div>
            <p>Closed</p>
          </div>
        </div>
        <hr class="text-zinc-300" />
        <div id="spinner" class="flex justify-center items-center pt-10 hidden">
          <span class="loading loading-spinner loading-xl"></span>
        </div>
        <div
          id="card-container"
          class="p-6 bg-[#FBFBFB] grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3"
        ></div>
        <!-- Open the modal using ID.showModal() method -->
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
          <div class="modal-box">
            <div id="details-container" class="space-y-4">
              
            </div>
            <div class="modal-action">
              <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <button class="btn btn-primary">Close</button>
              </form>
            </div>
          </div>
        </dialog>
      </section>
    </main>
    <script src="./scripts/mainPage.js"></script>
  </body>
</html>
